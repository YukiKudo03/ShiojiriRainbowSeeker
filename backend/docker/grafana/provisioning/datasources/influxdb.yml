apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: shiojiri-rainbow
      defaultBucket: k6
    secureJsonData:
      token: ${INFLUXDB_TOKEN:-dev-token}
    isDefault: true
    editable: true
