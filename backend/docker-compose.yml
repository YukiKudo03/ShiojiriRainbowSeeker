# =============================================================================
# Shiojiri Rainbow Seeker Backend - Docker Compose (Development)
# =============================================================================
# Local development environment with PostgreSQL/PostGIS
#
# Usage:
#   docker compose up -d              # Start db + api
#   docker compose logs -f api        # View API logs
#   docker compose exec api bin/rails console  # Rails console
#   docker compose down               # Stop all services
#   docker compose down -v            # Stop and remove volumes
#
# Profiles:
#   docker compose --profile test run --rm test           # Run RSpec
#   docker compose --profile monitoring up -d             # Start InfluxDB + Grafana
# =============================================================================

name: shiojiri-rainbow-seeker

services:
  # ===========================================================================
  # PostgreSQL with PostGIS
  # ===========================================================================
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: shiojiri-rainbow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shiojiri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shiojiri_dev_password}
      POSTGRES_DB: shiojiri_rainbow_seeker_development
      # Create additional databases for Solid Cache/Queue/Cable
      POSTGRES_MULTIPLE_DATABASES: >-
        shiojiri_rainbow_seeker_development_cache,
        shiojiri_rainbow_seeker_development_queue,
        shiojiri_rainbow_seeker_development_cable
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shiojiri} -d shiojiri_rainbow_seeker_development"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Rails API (Development Mode)
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: shiojiri-rainbow-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Rails environment
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"

      # Database configuration
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-shiojiri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shiojiri_dev_password}

      # JWT secret (development only - use secure value in production)
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY:-dev_jwt_secret_key_change_in_production}

      # Solid Queue in Puma (single-server development mode)
      SOLID_QUEUE_IN_PUMA: "true"

      # External APIs
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      # Mount source code for live reload
      - .:/rails:cached
      # Use named volumes for better performance
      - bundle_cache:/usr/local/bundle
      - rails_cache:/rails/tmp/cache
      - rails_storage:/rails/storage
    ports:
      - "${API_PORT:-3000}:3000"
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: ["./bin/rails", "server", "-b", "0.0.0.0"]

  # ===========================================================================
  # Test Runner (profile: test)
  # ===========================================================================
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: test
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-shiojiri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shiojiri_dev_password}
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY:-test_jwt_secret_key}
      COVERAGE: "1"
    volumes:
      - .:/rails:cached
      - bundle_cache:/usr/local/bundle
    profiles: [test]
    command: ["bundle", "exec", "rspec"]

  # ===========================================================================
  # InfluxDB (for k6 test results and metrics)
  # ===========================================================================
  influxdb:
    image: influxdb:2.7-alpine
    container_name: shiojiri-rainbow-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-influxdb_dev_password}
      DOCKER_INFLUXDB_INIT_ORG: shiojiri-rainbow
      DOCKER_INFLUXDB_INIT_BUCKET: k6
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-dev-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [monitoring]

  # ===========================================================================
  # Grafana (dashboards for k6 and API monitoring)
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: shiojiri-rainbow-grafana
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_dev_password}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-dev-token}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    profiles: [monitoring]

  # ===========================================================================
  # Redis (Optional - for Action Cable or caching if not using Solid variants)
  # ===========================================================================
  # Uncomment if you need Redis for any specific use case
  # redis:
  #   image: redis:7-alpine
  #   container_name: shiojiri-rainbow-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: shiojiri-rainbow-postgres
  bundle_cache:
    name: shiojiri-rainbow-bundle
  rails_cache:
    name: shiojiri-rainbow-cache
  rails_storage:
    name: shiojiri-rainbow-storage
  influxdb_data:
    name: shiojiri-rainbow-influxdb
  grafana_data:
    name: shiojiri-rainbow-grafana
  # redis_data:
  #   name: shiojiri-rainbow-redis

# =============================================================================
# Networks
# =============================================================================
networks:
  default:
    name: shiojiri-rainbow-network
