# CI Workflow - Mobile App
# =========================
# This workflow runs tests, linting, and type checks for the React Native mobile app.
#
# Runs on:
# - Push to main/develop branches
# - Pull requests to main/develop
# - Manual trigger
#
# Task 57: CI/CD Pipeline Construction
# Requirements: All FR

name: CI Mobile

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'mobile/**'
      - '.github/workflows/ci-mobile.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'mobile/**'
      - '.github/workflows/ci-mobile.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Lint and Type Check
  # ==========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --format=github-actions || npm run lint

      - name: Run TypeScript type check
        run: npm run type-check || npx tsc --noEmit

      - name: Check for circular dependencies
        run: |
          npx madge --circular --extensions ts,tsx src/ || true

      - name: npm audit (security scan)
        run: npm audit --audit-level=high

  # ==========================================================================
  # Unit Tests
  # ==========================================================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --coverage --coverageReporters=json-summary --coverageReporters=text

      - name: Check coverage threshold (50%)
        run: |
          COVERAGE_FILE="coverage/coverage-summary.json"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "::warning::Coverage summary not found, skipping threshold check"
            exit 0
          fi
          TOTAL=$(node -e "const c = require('./$COVERAGE_FILE'); console.log(c.total.lines.pct)")
          echo "Total line coverage: ${TOTAL}%"
          PASS=$(node -e "console.log($TOTAL >= 50 ? 'true' : 'false')")
          if [ "$PASS" != "true" ]; then
            echo "::error::Coverage ${TOTAL}% is below 50% threshold"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-unit-coverage
          path: mobile/coverage/
          retention-days: 7

  # ==========================================================================
  # Component Tests
  # ==========================================================================
  test-components:
    name: Component Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run component tests
        run: npm run test:components -- --coverage --coverageReporters=json-summary --coverageReporters=text

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-component-coverage
          path: mobile/coverage/
          retention-days: 7

  # ==========================================================================
  # Build Check
  # ==========================================================================
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test-unit, test-components]
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Expo export check
        run: npx expo export --platform web --output-dir dist || echo "Web export not configured"
        continue-on-error: true

      - name: Verify dependencies
        run: npx expo doctor || true

  # ==========================================================================
  # E2E Tests (Detox)
  # ==========================================================================
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-14
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS app
        run: detox build --configuration ios.sim.release

      - name: Run E2E tests
        run: detox test --configuration ios.sim.release --cleanup

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: mobile/artifacts/
          retention-days: 7

  # ==========================================================================
  # Mobile CI Summary
  # ==========================================================================
  mobile-summary:
    name: Mobile CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-components, build, e2e-ios]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# Mobile CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" == "success" ]; then
            echo "| Lint & Type Check | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Lint & Type Check | :x: Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test-unit.result }}" == "success" ]; then
            echo "| Unit Tests | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Unit Tests | :x: Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test-components.result }}" == "success" ]; then
            echo "| Component Tests | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Component Tests | :x: Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "| Build Check | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Build Check | :x: Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.e2e-ios.result }}" == "success" ]; then
            echo "| E2E Tests (iOS) | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.e2e-ios.result }}" == "skipped" ]; then
            echo "| E2E Tests (iOS) | :fast_forward: Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| E2E Tests (iOS) | :x: Failed |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check overall status
        if: |
          needs.lint.result != 'success' ||
          needs.test-unit.result != 'success' ||
          needs.test-components.result != 'success' ||
          needs.build.result != 'success'
        run: |
          echo "::error::One or more mobile CI checks failed"
          exit 1
